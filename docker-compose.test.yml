version: '3.8'

services:
  api-tests:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    command: [ "/bin/sh", "-c", "mvn -X -Dtest=UserIntegrationTest test && mvn -X coveralls:report" ]
    #command: ["/bin/sh", "-c", "mvn -Dtest=UserIntegrationTest test && mvn coveralls:report -DrepoToken=$COVERALLS_REPO_TOKEN"]
    #command: ["mvn", "coveralls:report", "-DrepoToken=$COVERALLS_REPO_TOKEN", "&&"]
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_test:5432/apichallengedb_test
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - postgres_test

  postgres_test:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: apichallengedb_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/test_data

volumes:
  postgres_test_data:
